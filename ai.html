<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foxcus AI Assistant</title>
    <style>
        /* --- GLOBAL STYLE & PALETTE ALIGNMENT --- */
        body {
            background-color: #FDFBF7; /* Exact cozy warm cream background from your homepage */
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', sans-serif; /* Soft rounded typography matching Foxcus theme */
            color: #614E3C; /* Warm dark brown text instead of harsh pure black */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-home {
            align-self: flex-start;
            color: #8B623F;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }
        .back-home:hover {
            transform: translateX(-3px);
        }

        /* --- THE CHAT DISPLAY CARD --- */
        .ai-page-container {
            width: 100%;
            max-width: 650px;
            height: 80vh;
            background-color: #FDFBF7;
            border: 4px solid #8B623F; /* Thick cozy border framework */
            border-radius: 20px; /* Playful rounded corners matching your main layout cards */
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 0px rgba(139, 98, 63, 0.15); /* Soft structural shadow drop */
            box-sizing: border-box;
        }

        h2 {
            color: #8B623F;
            margin: 0 0 5px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #8A7B6E;
            margin: 0 0 20px 0;
        }

        /* --- STREAMLINED CHAT AREA --- */
        .chat-display {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: #FFFFFF;
            border: 3px solid #E6DFD3;
            border-radius: 15px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 75%;
            font-size: 0.95rem;
            line-height: 1.4;
            box-sizing: border-box;
        }

        /* Matches your soft text panel backgrounds */
        .bot {
            background-color: #EBE5DA; 
            align-self: flex-start;
            color: #4A3B2C;
            border-bottom-left-radius: 4px;
        }

        /* Matches your main layout button asset coloring */
        .user {
            background-color: #A9BA7A; /* Beautiful soft olive green matching your main room actions */
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: bold;
        }

        /* --- CHAT INPUT BAR LOWER DOCK --- */
        .chat-input-area {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px;
            border: 3px solid #E6DFD3;
            border-radius: 12px;
            font-size: 1rem;
            background-color: #FFFFFF;
            color: #4A3B2C;
            font-family: inherit;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #8B623F;
        }

        /* Beautiful rounded brown actions matching 'STOP FOCUSING' and 'Ask AI' precisely */
        .chat-input-area button {
            background-color: #8B623F;
            color: #FFFFFF;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: inherit;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        .chat-input-area button:hover {
            background-color: #734F30;
        }
        .chat-input-area button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <a href="main.html" class="back-home">⬅ Back to Study Room</a>
    
    <div class="ai-page-container">
        <h2>🦊 Foxcus Academic AI Assistant</h2>
        <p class="subtitle">Ask questions regarding your studies, economics indicators, active recall, or essay formatting.</p>
        
        <div id="chat-display" class="chat-display">
            <div class="message bot">Hello! I am your AI study assistant. Ask me anything about managing your studies, handling stress, or optimizing your focus blocks.</div>
        </div>
        
        <div class="chat-input-area">
            <!-- Fixed input and button hooks matching script actions -->
            <input type="text" id="ai-user-query" placeholder="Type your study question here..." autofocus>
            <button id="ai-send-btn">Ask AI</button>
        </div>
    </div>

    <!-- SCRIPT SECTION: Built right into the page to ensure instant zero-latency processing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
            // Paste your exact AQ key safely inside the quotes
            const API_KEY = "AQ.Ab8RN6Jfp_HVdn1klzk2eRDFk4zxJJhy8jdNeLrCiBmjDKGS7w"; 

            const sendBtn = document.getElementById("ai-send-btn");
            const userInput = document.getElementById("ai-user-query");
            const chatDisplay = document.getElementById("chat-display");

            sendBtn.addEventListener("click", processQuery);
            userInput.addEventListener("keypress", (e) => { if (e.key === 'Enter') processQuery(); });

            async function processQuery() {
                const text = userInput.value.trim();
                if (!text) return;

                // 1. Display user message bubble instantly
                appendChatBubble(text, "user");
                userInput.value = "";

                // 2. Display "thinking..." loader element
                const thinkingBubble = appendChatBubble("🦊 Foxcus AI is thinking...", "bot");

                try {
                    // 3. Make a direct standard web fetch call straight to Google's API endpoint
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `You are Foxcus, a friendly, encouraging, and highly intelligent high school study assistant. Keep answers concise, highly supportive, and focused on helping the student. Question: ${text}`
                                }]
                            }]
                        })
                    });

                    const data = await response.json();

                    // 4. Safely parse the returning JSON response data payload
                    if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
                        const aiAnswerText = data.candidates[0].content.parts[0].text;
                        
                        // Delete the loading text element and render the real AI response
                        thinkingBubble.remove();
                        appendChatBubble(aiAnswerText, "bot");
                    } else {
                        // Capture specific API server level rejection text
                        throw new Error(data.error?.message || "The server rejected the key payload format.");
                    }

                } catch (error) {
                    console.error("Gemini Gateway Error:", error);
                    thinkingBubble.textContent = `System Alert: ${error.message || "Connection failed. Please check your live server environment setup!"}`;
                }
            }

            function appendChatBubble(msgText, senderClass) {
                const bubble = document.createElement("div");
                bubble.className = `message ${senderClass}`;

                if (senderClass === "bot") {
                    bubble.innerHTML = marked.parse(msgText);
                } else {
                    bubble.textContent = msgText;
                }

                chatDisplay.appendChild(bubble);
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
                return bubble;
            }
            async function fetchWithRetry(url, options, retries = 3) {
                for (let i = 0; i < retries; i++) {
                    const response = await fetch(url, options);
                    const data = await response.json();

                    if (response.ok) {
                        return data;
                    }

                    if (
                        data.error?.message?.includes("high demand")
                    ) {
                        await new Promise(resolve =>
                            setTimeout(resolve, 2000)
                        );
                        continue;
                    }

                    throw new Error(data.error?.message);
                }

                throw new Error("Gemini is currently busy. Please try again in a moment.");
            }
            const data = await fetchWithRetry(url, options);
        </script>
</body>
</html>
